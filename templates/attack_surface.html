<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>PentSuite — Attack Surface</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body{background:#0d1117;color:#e6edf3}
    .card{background:#161b22;border:1px solid #30363d}
    .nav-top{background:#161b22;border-bottom:1px solid #30363d;padding:.6rem 1.2rem}
    .grade-badge{font-size:4rem;font-weight:900;line-height:1}
    .zone-bar{height:16px;border-radius:8px;transition:width .5s}
    .metric{text-align:center;padding:1rem}
    .metric .val{font-size:1.8rem;font-weight:700}
    .metric .lbl{font-size:.75rem;color:#8b949e}
  </style>
</head>
<body>
<nav class="nav-top d-flex align-items-center justify-content-between">
  <div class="d-flex align-items-center gap-3">
    <span style="font-weight:700"><i class="fas fa-terminal text-info"></i> PentSuite</span>
    <a href="/dashboard" class="btn btn-sm btn-outline-secondary">Dashboard</a>
    <a href="/compliance" class="btn btn-sm btn-outline-secondary">Compliance</a>
  </div>
  <div class="d-flex gap-2 align-items-center">
    <select class="form-select form-select-sm bg-dark text-light border-secondary" id="projSel" style="width:260px" onchange="loadSurface(this.value)">
      <option value="">— Select project —</option>
    </select>
    <a href="/logout" class="btn btn-sm btn-outline-danger"><i class="fas fa-sign-out-alt"></i></a>
  </div>
</nav>

<div class="container py-4">
  <h5 class="mb-4"><i class="fas fa-crosshairs me-2 text-info"></i>Attack Surface Score</h5>
  <div id="no-sel" class="text-center py-5 text-secondary">Select a project to view its attack surface analysis</div>
  <div id="content" style="display:none">
    <div class="row g-3 mb-4">
      <!-- Grade -->
      <div class="col-md-3">
        <div class="card card-body text-center">
          <div class="text-secondary small mb-1">SECURITY GRADE</div>
          <div class="grade-badge" id="grade-el">—</div>
          <div class="text-secondary small mt-1" id="score-el">score: 0/100</div>
          <div class="badge mt-2" id="trend-el">—</div>
        </div>
      </div>
      <!-- Metrics grid -->
      <div class="col-md-9">
        <div class="card h-100">
          <div class="row g-0 h-100" id="metrics-row"></div>
        </div>
      </div>
    </div>

    <div class="row g-3">
      <!-- Risk zones radar -->
      <div class="col-md-5">
        <div class="card card-body">
          <h6 class="mb-3">Risk Zones</h6>
          <div id="zones-bars"></div>
        </div>
      </div>
      <!-- Score history -->
      <div class="col-md-7">
        <div class="card card-body">
          <h6 class="mb-3">Score History</h6>
          <canvas id="histChart" height="180"></canvas>
        </div>
      </div>
    </div>

    <div class="mt-3">
      <a id="poc-dl" href="#" class="btn btn-sm btn-outline-info me-2"><i class="fas fa-code me-1"></i>Download Python PoC</a>
      <a id="risk-link" href="#" class="btn btn-sm btn-outline-warning me-2" target="_blank"><i class="fas fa-chart-bar me-1"></i>Risk Score Detail</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
let histChart = null;

async function loadProjects() {
  const r = await fetch('/api/projects');
  const projects = await r.json();
  const sel = document.getElementById('projSel');
  Object.entries(projects).forEach(([id,p]) => {
    const o=document.createElement('option'); o.value=id; o.textContent=p.name||p.target||id; sel.appendChild(o);
  });
}

async function loadSurface(pid) {
  if (!pid) { document.getElementById('no-sel').style.display=''; document.getElementById('content').style.display='none'; return; }
  document.getElementById('no-sel').style.display='none';
  document.getElementById('content').style.display='';
  document.getElementById('poc-dl').href=`/api/projects/${pid}/replay-pocs?format=python`;
  document.getElementById('risk-link').href=`/api/projects/${pid}/risk-score`;

  const r = await fetch(`/api/projects/${pid}/attack-surface`);
  const d = await r.json();
  const latest = d.latest || {};
  const scores = d.history || [];

  // Grade
  const grade = latest.grade || '—';
  const gradeEl = document.getElementById('grade-el');
  gradeEl.textContent = grade;
  gradeEl.style.color = {A:'#3fb950',B:'#58a6ff',C:'#f0b72f',D:'#ff7b2b',F:'#ff3b3b'}[grade]||'#e6edf3';
  document.getElementById('score-el').textContent = `score: ${latest.score||0}/100`;
  const trendEl = document.getElementById('trend-el');
  const trend = d.trend || 'insufficient_data';
  trendEl.textContent = {improving:'↓ Improving',worsening:'↑ Worsening',insufficient_data:'— Insufficient data'}[trend];
  trendEl.style.background = {improving:'#0f2d0f',worsening:'#3d0000',insufficient_data:'#1c2332'}[trend];
  trendEl.style.color = {improving:'#3fb950',worsening:'#ff3b3b',insufficient_data:'#8b949e'}[trend];

  // Metrics
  const bd = latest.severity_breakdown || {};
  const metrics = [
    {lbl:'Open Ports',val:latest.open_ports||0,color:'#58a6ff'},
    {lbl:'Services',val:latest.services||0,color:'#58a6ff'},
    {lbl:'Risky Svcs',val:latest.risky_services||0,color:'#ff7b2b'},
    {lbl:'Web Exposed',val:latest.web_exposed||0,color:'#f0b72f'},
    {lbl:'Total Findings',val:latest.total_findings||0,color:'#e6edf3'},
    {lbl:'Critical',val:bd.critical||0,color:'#ff3b3b'},
  ];
  document.getElementById('metrics-row').innerHTML = metrics.map(m=>`
    <div class="col-4 col-md-2 metric border-end border-bottom border-secondary">
      <div class="val" style="color:${m.color}">${m.val}</div>
      <div class="lbl">${m.lbl}</div>
    </div>`).join('');

  // Risk zones
  const zones = latest.risk_zones || {};
  document.getElementById('zones-bars').innerHTML = Object.entries(zones).map(([k,v])=>`
    <div class="mb-3">
      <div class="d-flex justify-content-between small mb-1">
        <span>${k.charAt(0).toUpperCase()+k.slice(1)}</span><span>${v}/10</span>
      </div>
      <div style="background:#21262d;border-radius:8px;overflow:hidden">
        <div class="zone-bar" style="width:${v*10}%;background:${v>=8?'#ff3b3b':v>=5?'#f0b72f':'#3fb950'}"></div>
      </div>
    </div>`).join('');

  // History chart
  if (histChart) histChart.destroy();
  histChart = new Chart(document.getElementById('histChart').getContext('2d'), {
    type:'line',
    data:{
      labels: scores.map(s=>s.calculated_at?.slice(0,10)||''),
      datasets:[{label:'Score',data:scores.map(s=>s.score||0),
        borderColor:'#388bfd',backgroundColor:'rgba(56,139,253,0.1)',fill:true,tension:.3,pointRadius:4}]
    },
    options:{scales:{y:{min:0,max:100,grid:{color:'#21262d'},ticks:{color:'#8b949e'}},
      x:{grid:{color:'#21262d'},ticks:{color:'#8b949e'}}},
      plugins:{legend:{labels:{color:'#e6edf3'}}}}
  });
}

loadProjects();
</script>
</body>
</html>
